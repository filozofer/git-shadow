name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create release tarball
        id: tarball
        run: |
          ARCHIVE="git-shadow-${{ steps.version.outputs.version }}.tar.gz"
          git archive \
            --format=tar.gz \
            --prefix="git-shadow-${{ steps.version.outputs.version }}/" \
            HEAD \
            > "$ARCHIVE"
          echo "archive=$ARCHIVE" >> "$GITHUB_OUTPUT"
          echo "sha256=$(sha256sum "$ARCHIVE" | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.tarball.outputs.archive }}
          generate_release_notes: true
          body: |
            ## Install

            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | bash
            ```

            ## npm

            ```bash
            npm install -g git-shadow
            ```

            ---
            **sha256:** `${{ steps.tarball.outputs.sha256 }}`
